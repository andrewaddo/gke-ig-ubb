# values.yaml for the InferencePool Helm chart
inferenceExtension:
  replicas: 1
  image:
    name: epp
    hub: registry.k8s.io/gateway-api-inference-extension
    tag: v1.4.0
    pullPolicy: Always
  extProcPort: 9002
  pluginsCustomConfig:
    custom-plugins.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: least-request-scorer
        name: least-request
      schedulingProfiles:
      - name: default
        plugins:
        - pluginRef: least-request
inferencePool:
  modelServerType: custom
  targetPortNumber: 8000
  modelServers:
    matchLabels:
      pool: unified-recml-pool
provider:
  name: gke