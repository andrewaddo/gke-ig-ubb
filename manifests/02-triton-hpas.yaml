# HPAs using simplified Pod metrics
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-l4-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-recml-l4
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Pods
    pods:
      metric:
        name: autoscaling.gke.io|l4-gpu-util|nv_gpu_utilization
      target:
        type: AverageValue
        averageValue: "600m" # 0.6 in milli-units
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-g4-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-recml-g4
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Pods
    pods:
      metric:
        name: autoscaling.gke.io|g4-gpu-util|nv_gpu_utilization
      target:
        type: AverageValue
        averageValue: "600m"
