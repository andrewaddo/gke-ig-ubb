# L4 Triton Deployment (Standardized Environment-Aware Code)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-recml-l4
  labels:
    app: triton-recml
    pool: unified-recml-pool
    gpu: l4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-recml
      pool: unified-recml-pool
  template:
    metadata:
      labels:
        app: triton-recml
        pool: unified-recml-pool
        gpu: l4
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      initContainers:
      - name: generate-model
        image: us-west1-docker.pkg.dev/gpu-launchpad-playground/triton-images/pytorch:25.05-py3
        env:
        - name: LOOP_COUNT
          value: "1000" # Standard L4 processing takes ~260ms with 1000 loops
        command:
        - python3
        - -c
        - |
          import os
          import torch
          import torch.nn as nn
          class HeavyModel(nn.Module):
              def __init__(self, loops):
                  super().__init__()
                  self.layer = nn.Linear(4096, 4096)
                  self.loops = loops
              def forward(self, x):
                  # Do some math to make it not instantaneous
                  for _ in range(self.loops):
                      x = self.layer(x)
                      x = torch.relu(x)
                  return x
          
          loops = int(os.getenv("LOOP_COUNT", "1000"))
          print(f"Generating model trace with {loops} internal loops.")
          model = HeavyModel(loops)
          dummy_input = torch.randn(1, 4096)
          traced = torch.jit.trace(model, dummy_input)
          os.makedirs("/models/recml-model/1", exist_ok=True)
          traced.save("/models/recml-model/1/model.pt")
          
          config = """name: "recml-model"
          platform: "pytorch_libtorch"
          max_batch_size: 0
          input [ { name: "INPUT__0", data_type: TYPE_FP32, dims: [ 1, 4096 ] } ]
          output [ { name: "OUTPUT__0", data_type: TYPE_FP32, dims: [ 1, 4096 ] } ]
          instance_group [ { count: 1, kind: KIND_GPU, gpus: [ 0 ] } ]
          dynamic_batching {
            default_queue_policy {
              default_timeout_microseconds: 29000000
              timeout_action: REJECT
              allow_timeout_override: true
            }
          }
          """
          with open("/models/recml-model/config.pbtxt", "w") as f:
              f.write(config)
        volumeMounts:
        - name: model-repository
          mountPath: /models
      containers:
      - name: triton
        image: us-west1-docker.pkg.dev/gpu-launchpad-playground/triton-images/tritonserver:25.05-py3
        command: ["/opt/tritonserver/bin/tritonserver"]
        args: ["--model-repository=/models", "--allow-metrics=true", "--metrics-port=8080", "--strict-model-config=false", "--allow-grpc=false", "--http-header-forward-pattern="]
        resources:
          requests: { cpu: "100m", memory: "2Gi" }
          limits: { cpu: "3900m", memory: "8Gi", nvidia.com/gpu: 1 }
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8080
          name: metrics
        volumeMounts:
        - name: model-repository
          mountPath: /models
      volumes:
      - name: model-repository
        emptyDir: {}
---
# G4 Triton Deployment (Standardized Environment-Aware Code)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-recml-g4
  labels:
    app: triton-recml
    pool: unified-recml-pool
    gpu: g4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-recml
      pool: unified-recml-pool
  template:
    metadata:
      labels:
        app: triton-recml
        pool: unified-recml-pool
        gpu: g4
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-rtx-pro-6000
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      initContainers:
      - name: generate-model
        image: us-west1-docker.pkg.dev/gpu-launchpad-playground/triton-images/pytorch:25.05-py3
        env:
        - name: LOOP_COUNT
          # The G4 is ~14.5x faster than the L4. 
          # To make it take ~260ms (the speed of an L4 running 1000 loops), 
          # we force the G4 to run ~14,500 loops.
          value: "14500" 
        command:
        - python3
        - -c
        - |
          import os
          import torch
          import torch.nn as nn
          class HeavyModel(nn.Module):
              def __init__(self, loops):
                  super().__init__()
                  self.layer = nn.Linear(4096, 4096)
                  self.loops = loops
              def forward(self, x):
                  # Do some math to make it not instantaneous
                  for _ in range(self.loops):
                      x = self.layer(x)
                      x = torch.relu(x)
                  return x
          
          loops = int(os.getenv("LOOP_COUNT", "1000"))
          print(f"Generating model trace with {loops} internal loops.")
          model = HeavyModel(loops)
          dummy_input = torch.randn(1, 4096)
          traced = torch.jit.trace(model, dummy_input)
          os.makedirs("/models/recml-model/1", exist_ok=True)
          traced.save("/models/recml-model/1/model.pt")
          
          config = """name: "recml-model"
          platform: "pytorch_libtorch"
          max_batch_size: 0
          input [ { name: "INPUT__0", data_type: TYPE_FP32, dims: [ 1, 4096 ] } ]
          output [ { name: "OUTPUT__0", data_type: TYPE_FP32, dims: [ 1, 4096 ] } ]
          instance_group [ { count: 1, kind: KIND_GPU, gpus: [ 0 ] } ]
          dynamic_batching {
            default_queue_policy {
              default_timeout_microseconds: 29000000
              timeout_action: REJECT
              allow_timeout_override: true
            }
          }
          """
          with open("/models/recml-model/config.pbtxt", "w") as f:
              f.write(config)
        volumeMounts:
        - name: model-repository
          mountPath: /models
      containers:
      - name: triton
        image: us-west1-docker.pkg.dev/gpu-launchpad-playground/triton-images/tritonserver:25.05-py3
        command: ["/opt/tritonserver/bin/tritonserver"]
        args: ["--model-repository=/models", "--allow-metrics=true", "--metrics-port=8080", "--strict-model-config=false", "--allow-grpc=false", "--http-header-forward-pattern="]
        resources:
          requests: { cpu: "100m", memory: "2Gi" }
          limits: { cpu: "16", memory: "32Gi", nvidia.com/gpu: 1 }
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8080
          name: metrics
        volumeMounts:
        - name: model-repository
          mountPath: /models
      volumes:
      - name: model-repository
        emptyDir: {}
