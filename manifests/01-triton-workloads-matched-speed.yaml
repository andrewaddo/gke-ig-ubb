# L4 Triton Deployment (Standardized Environment-Aware Code)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-recml-l4
  labels:
    app: triton-recml
    pool: unified-recml-pool
    gpu: l4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-recml
      pool: unified-recml-pool
  template:
    metadata:
      labels:
        app: triton-recml
        pool: unified-recml-pool
        gpu: l4
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      initContainers:
      - name: generate-model
        image: busybox
        command:
        - sh
        - -c
        - |
          mkdir -p /models/recml-model/1
          cat <<'PYCONF' > /models/recml-model/config.pbtxt
          name: "recml-model"
          backend: "python"
          max_batch_size: 0
          input [ { name: "INPUT__0", data_type: TYPE_FP32, dims: [ 1, 4096 ] } ]
          output [ { name: "OUTPUT__0", data_type: TYPE_FP32, dims: [ 1, 4096 ] } ]
          instance_group [ { count: 1, kind: KIND_CPU } ]
          PYCONF

          # THE CODE IS NOW IDENTICAL
          cat <<'PYMODEL' > /models/recml-model/1/model.py
          import triton_python_backend_utils as pb_utils
          import time
          import os

          class TritonPythonModel:
              def execute(self, requests):
                  # Read delay from environment variable
                  delay = float(os.getenv("PROCESSING_DELAY", "0.26"))
                  if delay > 0:
                      time.sleep(delay)
                  
                  responses = []
                  for request in requests:
                      in_0 = pb_utils.get_input_tensor_by_name(request, "INPUT__0")
                      out_tensor_0 = pb_utils.Tensor("OUTPUT__0", in_0.as_numpy())
                      responses.append(pb_utils.InferenceResponse(output_tensors=[out_tensor_0]))
                  return responses
          PYMODEL
        volumeMounts:
        - name: model-repository
          mountPath: /models
      containers:
      - name: triton
        image: nvcr.io/nvidia/tritonserver:25.05-py3
        env:
        - name: PROCESSING_DELAY
          value: "0.26"
        command: ["/opt/tritonserver/bin/tritonserver"]
        args: ["--model-repository=/models", "--allow-metrics=true", "--strict-model-config=false"]
        resources:
          requests: { cpu: "100m", memory: "2Gi" }
          limits: { cpu: "2", memory: "4Gi", nvidia.com/gpu: 1 }
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 8002
          name: metrics
        volumeMounts:
        - name: model-repository
          mountPath: /models
      volumes:
      - name: model-repository
        emptyDir: {}
---
